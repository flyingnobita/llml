# Sync the winget-pkgs fork before or after releases so GoReleaser PRs merge cleanly.
# Requires: repository secret WINGET_GITHUB_TOKEN (PAT with contents:write on the fork).

name: Sync winget-pkgs fork

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  sync:
    # Secrets cannot be used in job-level `if:` (invalid workflow). Manual runs fail clearly
    # when the secret is missing; scheduled runs exit 0 if unset so weekly cron does not spam.
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Sync fork with microsoft/winget-pkgs
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "::error::WINGET_GITHUB_TOKEN is not set. Add a PAT in Repo → Settings → Secrets and variables → Actions (needs push access to ${{ github.repository_owner }}/winget-pkgs)."
              exit 1
            fi
            echo "Skipping scheduled sync: WINGET_GITHUB_TOKEN is not set."
            exit 0
          fi
          FORK="${{ github.repository_owner }}/winget-pkgs"
          if ! gh repo view "${FORK}" >/dev/null 2>&1; then
            echo "::error::Fork ${FORK} not found. Fork https://github.com/microsoft/winget-pkgs on GitHub, or run scripts/setup-winget-fork.sh locally with gh auth."
            exit 1
          fi
          gh repo sync "${FORK}" -b master
