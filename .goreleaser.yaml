# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# https://goreleaser.com
version: 2

project_name: llml

before:
  hooks:
    - go mod tidy

builds:
  - id: llml
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    main: ./cmd/llml
    binary: llml
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X=main.version={{.Version}}

archives:
  - id: llml
    ids:
      - llml
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

brews:
  - name: llml
    ids:
      - llml
    homepage: https://github.com/flyingnobita/llml
    description: Terminal UI to discover local models and launch llama-server, vLLM, or Ollama
    skip_upload: '{{ not (isEnvSet "HOMEBREW_TAP_GITHUB_TOKEN") }}'
    directory: Formula
    repository:
      owner: flyingnobita
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

scoops:
  - name: llml
    ids:
      - llml
    homepage: https://github.com/flyingnobita/llml
    description: Terminal UI to discover local models and launch llama-server, vLLM, or Ollama
    license: MIT
    skip_upload: '{{ not (isEnvSet "SCOOP_BUCKET_GITHUB_TOKEN") }}'
    repository:
      owner: flyingnobita
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

winget:
  - name: llml
    ids:
      - llml
    publisher: Flying Nobita
    publisher_url: https://github.com/flyingnobita
    publisher_support_url: https://github.com/flyingnobita/llml/issues
    package_identifier: FlyingNobita.llml
    short_description: Terminal UI to discover local models and launch llama-server, vLLM, or Ollama
    license: MIT
    homepage: https://github.com/flyingnobita/llml
    skip_upload: '{{ not (isEnvSet "WINGET_GITHUB_TOKEN") }}'
    repository:
      owner: flyingnobita
      name: winget-pkgs
      branch: "llml-{{ .Version }}"
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
