# Pre-commit hooks for llm-launch (Go + Prettier/markdownlint for docs).
# See https://pre-commit.com for more information.

repos:
  - repo: local
    hooks:
      - id: docs-fix
        name: docs fix (prettier + markdownlint)
        entry: scripts/precommit-docs-fix.sh
        language: script
        stages: [pre-commit]
      - id: mise-check
        name: mise run check
        entry: mise run check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

default_install_hook_types: [pre-commit, pre-push]
