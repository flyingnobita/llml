# mise: package and tool management
# https://mise.jdx.dev/
# Machine-specific [env] (paths, ports): use mise.local.toml (gitignored).

[tools]
go = "latest"
node = "lts"
goreleaser = "2.12.2"
"pipx:pre-commit" = "latest"

[tasks]
run = "go run ./cmd/llml"
build = "go build -o bin/llml ./cmd/llml"
fmt = "go fmt ./..."
fmt-check = "scripts/gofmt-check.sh"
vet = "go vet ./..."
test = "go test -race ./..."
prettier-fix = "npx prettier --write \"**/*.{md,yaml,yml,json}\" \".prettierrc\""
prettier-check = "npx prettier --check \"**/*.{md,yaml,yml,json}\" \".prettierrc\""
markdownlint-fix = "npx markdownlint-cli2 --fix \"**/*.md\" \"#**/skills/**\""
markdownlint-check = "npx markdownlint-cli2 \"**/*.md\" \"#**/skills/**\""
goreleaser-check = "goreleaser check"
format = "mise run fmt && mise run prettier-fix && mise run markdownlint-fix"
lint = "mise run fmt-check && mise run vet && mise run prettier-check && mise run markdownlint-check && mise run goreleaser-check"
check = "mise run lint && mise run test"
